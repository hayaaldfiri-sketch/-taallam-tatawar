<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعلم وتطور</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* الهيدر */
.header {
  background: linear-gradient(to right, #7b2ff7, #f107a3);
  color: white;
  padding: 25px;
  border-radius: 0 0 20px 20px;
}

/* الحاوية */
.container {
  padding: 20px;
}

/* الكروت */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.05);
}

/* زر */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #7b2ff7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* شريط التقدم */
.progress {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 20%;
  background: #7b2ff7;
  transition: 0.3s;
}

/* إخفاء الصفحات */
.hidden {
  display: none;
}

/* خيارات */
.option {
  background: #eee;
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
  cursor: pointer;
}

.option:hover {
  background: #ddd;
}

.correct {
  background: #4caf50 !important;
  color: white;
}

.wrong {
  background: #f44336 !important;
  color: white;
}
</style>

<script>
let step = 0;
let progress = 20;

function startLesson() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("lesson").classList.remove("hidden");
}

function nextStep() {
  step++;
  progress += 20;
  document.getElementById("bar").style.width = progress + "%";

  const content = document.getElementById("lessonContent");

  if(step == 1){
    content.innerHTML = "📌 المعلومة الصحيحة تحتاج دليل موثوق.";
  }
  else if(step == 2){
    content.innerHTML = "📌 لا تصدق كل ما تشوفه في الإنترنت.";
  }
  else if(step == 3){
    content.innerHTML = `
    <h3>🧠 اختبار سريع</h3>
    <div class="option" onclick="check(this,true)">مصدر موثوق</div>
    <div class="option" onclick="check(this,false)">إشاعة</div>
    `;
  }
  else {
    content.innerHTML = "🎉 أحسنت! انتهى الدرس";
  }
}

function check(el, correct){
  if(correct){
    el.classList.add("correct");
    alert("✔ إجابة صحيحة!");
  } else {
    el.classList.add("wrong");
    alert("❌ حاول مرة أخرى");
  }
}
</script>

</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home">
  <div class="header">
    <h2>👋 مرحباً</h2>
    <p>استمر في تطوير مهاراتك 💜</p>
  </div>

  <div class="container">

    <div class="card">
      <h3>📊 نسبة التقدم</h3>
      <div class="progress">
        <div id="bar" class="progress-bar"></div>
      </div>
    </div>

    <div class="card">
      <h3>🎯 المهام</h3>
      <ul>
        <li>✔ مشاهدة درس</li>
        <li>⬜ حل اختبار</li>
        <li>⬜ قراءة ملخص</li>
      </ul>
    </div>

    <div class="card">
      <h3>📚 درس اليوم</h3>
      <p>التفكير الناقد</p>
      <button onclick="startLesson()">ابدأ</button>
    </div>

  </div>
</div>

<!-- صفحة الدرس -->
<div id="lesson" class="hidden container">

  <div class="card">
    <h2>📘 الدرس</h2>
    <p id="lessonContent">
      التفكير الناقد هو تحليل المعلومات قبل تصديقها.
    </p>

    <button onclick="nextStep()">التالي</button>
  </div>

</div>

</body>
</html>
