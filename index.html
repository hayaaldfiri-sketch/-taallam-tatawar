<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلم وتطور</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* شاشة */
.screen {
  display: none;
  padding: 20px;
}
.active {
  display: block;
}

/* هيدر */
.header {
  background: linear-gradient(to right, #7b5cff, #a58bff);
  color: white;
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

/* كروت */
.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
}

/* زر */
button {
  background: #7b5cff;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
  margin-top: 10px;
}

/* القائمة */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

/* progress */
.progress {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
}
.progress div {
  height: 100%;
  background: #7b5cff;
  width: 60%;
}
</style>
</head>

<body>

<!-- شاشة ترحيب -->
<div class="screen active" id="welcome">
  <div class="header">
    <h2>👋 مرحباً بك</h2>
    <p>ابدأ رحلتك في التعلم</p>
  </div>

  <button onclick="go('home')">ابدأ الآن</button>
</div>

<!-- الرئيسية -->
<div class="screen" id="home">
  <div class="header">
    <h2>👋 أهلاً</h2>
    <p>استمر في تطوير مهاراتك</p>
  </div>

  <div class="card">
    <h3>📊 التقدم</h3>
    <div class="progress"><div></div></div>
    <p>60%</p>
  </div>

  <div class="card">
    <h3>🎯 الأهداف</h3>
    <ul>
      <li>تعلم HTML</li>
      <li>إنهاء درس</li>
      <li>حل اختبار</li>
    </ul>
  </div>

  <div class="card">
    <h3>📚 درس</h3>
    <p>تعلم أساسيات التفكير</p>
    <button onclick="go('lesson')">ابدأ</button>
  </div>
</div>

<!-- الدرس -->
<div class="screen" id="lesson">
  <div class="header">
    <h2>📘 الدرس</h2>
  </div>

  <div class="card">
    <p>التفكير التحليلي هو فهم المشكلة وتقسيمها.</p>
  </div>

  <button onclick="go('quiz')">ابدأ الاختبار</button>
</div>

<!-- اختبار -->
<div class="screen" id="quiz">
  <div class="header">
    <h2>🧠 اختبار رياضي</h2>
  </div>

  <div class="card">
    <p>كم 5 + 3 ؟</p>
    <button onclick="answer(8)">8</button>
    <button onclick="answer(6)">6</button>
  </div>

  <div class="card">
    <p>كم 10 × 2 ؟</p>
    <button onclick="answer(20)">20</button>
    <button onclick="answer(15)">15</button>
  </div>
</div>

<!-- نشاط -->
<div class="screen" id="game">
  <div class="header">
    <h2>🎮 نشاط</h2>
  </div>

  <div class="card">
    <p>اختر الشكل الصحيح</p>
    <button onclick="alert('صح!')">🔵</button>
    <button onclick="alert('خطأ')">🔺</button>
  </div>
</div>

<!-- القائمة -->
<div class="nav">
  <button onclick="go('home')">🏠</button>
  <button onclick="go('quiz')">🧠</button>
  <button onclick="go('game')">🎮</button>
</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function answer(x){
  if(x === 8 || x === 20){
    alert("إجابة صحيحة 🎉");
  } else {
    alert("حاول مرة أخرى ❌");
  }
}
</script>

</body>
</html>
