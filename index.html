<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق برمجة</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f6fa;
}

/* هيدر */
.header {
  background: linear-gradient(45deg,#6a5af9,#8364ff);
  color:white;
  padding:20px;
  border-radius:0 0 25px 25px;
}

/* كروت */
.card {
  background:white;
  margin:15px;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}
.card:hover { transform:scale(1.03); }

.icon {
  width:50px;
  height:50px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
}

/* ازرار */
.btn {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#6a5af9,#8364ff);
  color:white;
  font-size:16px;
}

/* اخفاء الصفحات */
.page { display:none; }
.active { display:block; }

/* تقدم */
.progress {
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}
.bar {
  height:10px;
  width:0%;
  background:#6a5af9;
}

/* اشكال */
.circle, .square {
  width:80px;
  height:80px;
  margin:20px auto;
}

.circle {
  background:#6a5af9;
  border-radius:50%;
  animation:spin 3s infinite linear;
}

.square {
  background:#ff6584;
  animation:bounce 2s infinite;
}

/* حركات */
@keyframes spin {
  0% {transform:rotate(0);}
  100% {transform:rotate(360deg);}
}

@keyframes bounce {
  0%,100% {transform:translateY(0);}
  50% {transform:translateY(-20px);}
}
</style>
</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">

<div class="header">
  <h2>💻 برمجة - حياة الدفيري</h2>
  <p>ابدأ رحلتك التعليمية 🚀</p>
</div>

<div class="card" onclick="go('math')">
  <div>
    <h3>اختبار رياضي</h3>
    <p>سهل - متوسط - صعب</p>
  </div>
  <div class="icon" style="background:#6a5af9">🧠</div>
</div>

<div class="card" onclick="go('shapes')">
  <div>
    <h3>لعبة الأشكال</h3>
    <p>اختر الشكل الصحيح</p>
  </div>
  <div class="icon" style="background:#ff6584">🔷</div>
</div>

<div class="card" onclick="go('goals')">
  <div>
    <h3>الأهداف</h3>
    <p>تقدمك اليومي</p>
  </div>
  <div class="icon" style="background:#00c9a7">🎯</div>
</div>

</div>

<!-- الرياضيات -->
<div id="math" class="page">
<div class="header"><h2>🧠 اختبار</h2></div>

<div class="card">
<p>كم 3 + 5 ؟</p>
<button class="btn" onclick="check(this,true)">8</button>
<button class="btn" onclick="check(this,false)">6</button>
</div>

<div class="card">
<p>كم 2 × 10 ؟</p>
<button class="btn" onclick="check(this,true)">20</button>
<button class="btn" onclick="check(this,false)">15</button>
</div>

<div class="progress"><div id="bar" class="bar"></div></div>
<p>النقاط: <span id="score">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- الاشكال -->
<div id="shapes" class="page">
<div class="header"><h2>🎮 لعبة الأشكال</h2></div>

<p style="text-align:center">اضغط على الدائرة</p>

<div class="circle" onclick="shape(true)"></div>
<div class="square" onclick="shape(false)"></div>

<p style="text-align:center">النقاط: <span id="shapeScore">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- الأهداف -->
<div id="goals" class="page">
<div class="header"><h2>🎯 الأهداف</h2></div>

<div class="card"><p>✔ مشاهدة درس</p></div>
<div class="card"><p>⬜ حل اختبار</p></div>
<div class="card"><p>⬜ قراءة ملخص</p></div>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<script>
let score = 0;
let answered = 0;
let shapeScore = 0;

function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function check(btn, correct){
  if(btn.disabled) return;

  if(correct){
    btn.style.background="green";
    score+=2;
  } else {
    btn.style.background="red";
  }

  btn.disabled=true;
  answered++;

  document.getElementById("score").innerText=score;

  let percent = (answered/2)*100;
  document.getElementById("bar").style.width = percent+"%";

  if(answered===2){
    setTimeout(()=>{
      alert("انتهى المستوى!");
      go('home');
      answered=0;
    },800);
  }
}

function shape(correct){
  if(correct){
    shapeScore+=2;
    alert("صح!");
  } else {
    alert("خطأ!");
  }
  document.getElementById("shapeScore").innerText=shapeScore;
}
</script>

</body>
</html>
