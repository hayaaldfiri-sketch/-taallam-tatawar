<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلم و تطور مع مريم</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

/* هيدر */
.header{
  background:linear-gradient(45deg,#6a5af9,#8364ff);
  color:white;
  padding:20px;
  border-radius:0 0 25px 25px;
}

/* كرت الترحيب */
.welcome{
  background:linear-gradient(45deg,#6a5af9,#8364ff);
  margin:15px;
  padding:20px;
  border-radius:20px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* كروت */
.card{
  background:white;
  margin:10px 15px;
  padding:15px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* شبكة */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.mini{
  background:white;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.mini img{
  width:50px;
}

/* زر */
.btn{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#6a5af9,#8364ff);
  color:white;
}

/* صفحات */
.page{display:none;}
.active{display:block;}

/* تقدم */
.progress{
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}
.bar{
  height:10px;
  width:0%;
  background:#fff;
}

/* اشكال */
.circle,.square{
  width:80px;
  height:80px;
  margin:20px auto;
}

.circle{
  background:#6a5af9;
  border-radius:50%;
  animation:spin 3s infinite linear;
}

.square{
  background:#ff6584;
  animation:bounce 2s infinite;
}

/* حركات */
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="page active">

<div class="header">
<h2>💻 برمجة - حياة</h2>
<p>استمر في تطوير مهاراتك 🚀</p>
</div>

<div class="welcome">
<div>
<h3>هدفك اليوم</h3>
<p>تعلم مهارة جديدة</p>
<div class="progress"><div id="mainProgress" class="bar"></div></div>
</div>
<div style="font-size:40px;">🎯</div>
</div>

<h3 style="padding:10px">استكمال</h3>

<div class="card" onclick="go('math')">
<div>
<h4>اختبار رياضي</h4>
<p>سهل - متوسط - صعب</p>
</div>
<div>🧠</div>
</div>

<h3 style="padding:10px">الدروس</h3>

<div class="grid">

<div class="mini" onclick="go('shapes')">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721293.png">
<p>الأشكال</p>
</div>

<div class="mini" onclick="go('goals')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
<p>الأهداف</p>
</div>

</div>

</div>

<!-- اختبار -->
<div id="math" class="page">
<div class="header"><h2>🧠 اختبار</h2></div>

<div class="card">
<p>كم 3 + 5 ؟</p>
<button class="btn" onclick="check(this,true)">8</button>
<button class="btn" onclick="check(this,false)">6</button>
</div>

<div class="card">
<p>كم 2 × 10 ؟</p>
<button class="btn" onclick="check(this,true)">20</button>
<button class="btn" onclick="check(this,false)">15</button>
</div>

<div class="progress"><div id="bar" class="bar"></div></div>
<p>النقاط: <span id="score">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- الاشكال -->
<div id="shapes" class="page">
<div class="header"><h2>🎮 الأشكال</h2></div>

<p style="text-align:center">اضغط على الدائرة</p>

<div class="circle" onclick="shape(true)"></div>
<div class="square" onclick="shape(false)"></div>

<p style="text-align:center">النقاط: <span id="shapeScore">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- اهداف -->
<div id="goals" class="page">
<div class="header"><h2>🎯 الأهداف</h2></div>

<div class="card"><p>✔ مشاهدة درس</p></div>
<div class="card"><p>⬜ حل اختبار</p></div>
<div class="card"><p>⬜ قراءة ملخص</p></div>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<script>
let score=0;
let answered=0;
let shapeScore=0;

function go(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function check(btn,correct){
if(btn.disabled)return;

if(correct){
btn.style.background="green";
score+=2;
}else{
btn.style.background="red";
}

btn.disabled=true;
answered++;

document.getElementById("score").innerText=score;

let percent=(answered/2)*100;
document.getElementById("bar").style.width=percent+"%";

if(answered===2){
setTimeout(()=>{
go('home');
answered=0;
},800);
}
}

function shape(correct){
if(correct){
shapeScore+=2;
}else{}

document.getElementById("shapeScore").innerText=shapeScore;
}
</script>

</body>
</html>
