<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق تعلم و تطور مع مريم</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa}

/* هيدر */
.header{
background:linear-gradient(45deg,#6a5af9,#8364ff);
color:white;padding:20px;border-radius:0 0 25px 25px
}

/* كروت */
.card{
background:white;margin:10px 15px;padding:15px;border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.05)
}

/* زر */
.btn{
width:100%;padding:12px;margin:5px 0;border:none;border-radius:12px;
background:linear-gradient(45deg,#6a5af9,#8364ff);color:white
}

/* صفحات */
.page{display:none}
.active{display:block}

/* اشكال */
.circle,.square{
width:80px;height:80px;margin:20px auto
}

.circle{
background:#6a5af9;border-radius:50%;
animation:spin 3s infinite linear
}

.square{
background:#ff6584;
animation:bounce 2s infinite
}

/* انيميشن */
@keyframes spin{
0%{transform:rotate(0)}100%{transform:rotate(360deg)}
}
@keyframes bounce{
0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="page active">

<div class="header">
<h2>💻 برمجة</h2>
<p>اهلاً <span id="userName">...</span> 👋</p>
</div>

<div class="card">
<input id="nameInput" placeholder="اكتب اسمك"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc">
<button class="btn" onclick="saveName()">حفظ الاسم</button>
</div>

<div class="card" onclick="go('quiz')">
📊 اختبار عشوائي
</div>

<div class="card" onclick="go('shapes')">
🎮 لعبة الأشكال
</div>

<div class="card" onclick="go('video')">
🎥 شروحات
</div>

<div class="card" onclick="go('summary')">
📚 تلخيص
</div>

</div>

<!-- اختبار -->
<div id="quiz" class="page">
<div class="header"><h2>🧠 اختبار</h2></div>

<div class="card">
<p id="question"></p>
<button class="btn" onclick="answer(true)">✔</button>
<button class="btn" onclick="answer(false)">❌</button>
</div>

<p style="text-align:center">النقاط: <span id="score">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- الاشكال -->
<div id="shapes" class="page">
<div class="header"><h2>🎮 الأشكال</h2></div>

<p style="text-align:center" id="shapeQ">اضغط على الدائرة</p>

<div class="circle" onclick="shape('circle')"></div>
<div class="square" onclick="shape('square')"></div>

<p style="text-align:center">النقاط: <span id="shapeScore">0</span></p>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- فيديو -->
<div id="video" class="page">
<div class="header"><h2>🎥 شرح الجمع</h2></div>

<div class="card">
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/8jVhR8Kz7B0"
frameborder="0" allowfullscreen></iframe>
</div>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<!-- تلخيص -->
<div id="summary" class="page">
<div class="header"><h2>📚 جدول الضرب</h2></div>

<div class="card">
<table border="1" width="100%" style="text-align:center">
<tr><th>×</th><th>1</th><th>2</th><th>3</th></tr>
<tr><td>1</td><td>1</td><td>2</td><td>3</td></tr>
<tr><td>2</td><td>2</td><td>4</td><td>6</td></tr>
<tr><td>3</td><td>3</td><td>6</td><td>9</td></tr>
</table>
</div>

<button class="btn" onclick="go('home')">رجوع</button>
</div>

<script>
let score=0;
let correctAnswer;
let shapeScore=0;
let shapeType="circle";

/* تنقل */
function go(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");

if(p==="quiz") newQuestion();
}

/* اسم */
function saveName(){
let name=document.getElementById("nameInput").value;
document.getElementById("userName").innerText=name;
}

/* اختبار عشوائي */
function newQuestion(){
let a=Math.floor(Math.random()*10);
let b=Math.floor(Math.random()*10);

if(Math.random()>0.5){
correctAnswer=a+b;
document.getElementById("question").innerText=`كم ${a} + ${b} ؟`;
}else{
correctAnswer=a*b;
document.getElementById("question").innerText=`كم ${a} × ${b} ؟`;
}
}

function answer(correct){
let userCorrect = correctAnswer==correctAnswer; // صح
score+=2;
document.getElementById("score").innerText=score;
newQuestion();
}

/* اشكال */
function newShape(){
shapeType=Math.random()>0.5?"circle":"square";
document.getElementById("shapeQ").innerText=
shapeType==="circle"?"اضغط على الدائرة":"اضغط على المربع";
}

function shape(type){
if(type===shapeType){
shapeScore+=2;
}
document.getElementById("shapeScore").innerText=shapeScore;
newShape();
}

newShape();
</script>

</body>
</html>
