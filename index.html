<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التطبيق الأسطوري</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}

/* هيدر */
.header{
background:linear-gradient(to right,#7b5cff,#9b7bff);
color:white;padding:20px;text-align:center;
border-radius:0 0 25px 25px;
}

/* كروت */
.card{
background:white;margin:15px;padding:15px;
border-radius:15px;
}

/* زر */
button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:linear-gradient(to right,#7b5cff,#9b7bff);
color:white;font-size:16px;
}

/* تقدم */
.progress{background:#ddd;height:10px;border-radius:10px}
.bar{background:#7b5cff;height:100%;width:0%}

/* ناف */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;background:white;
}
.nav button{flex:1;border-radius:0}

/* أشكال */
.circle{width:70px;height:70px;background:red;border-radius:50%;display:inline-block;margin:10px}
.square{width:70px;height:70px;background:blue;display:inline-block;margin:10px}
.drop{width:80px;height:80px;border:2px dashed #aaa;display:inline-block;margin:10px}

/* إشعار */
.toast{
position:fixed;top:20px;left:50%;
transform:translateX(-50%);
background:#333;color:white;
padding:10px 20px;border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="header">
<h2>🚀 تطبيقك الذكي</h2>
<p>تعلم + لعب + تحدي</p>
</div>

<div class="card">
<h3>📊 تقدمك</h3>
<div class="progress"><div id="bar" class="bar"></div></div>
<p id="info"></p>
</div>

<div id="content"></div>

<div class="nav">
<button onclick="home()">🏠</button>
<button onclick="quiz()">🧠</button>
<button onclick="game()">🎮</button>
<button onclick="achievements()">🏆</button>
</div>

<div id="toast" class="toast"></div>

<script>

/* بيانات */
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;
let wins = parseInt(localStorage.getItem("wins")) || 0;

updateUI();

/* واجهة */
function updateUI(){
document.getElementById("info").innerText=
"المستوى: "+level+" | XP: "+xp;

let percent = (xp % 50)*2;
document.getElementById("bar").style.width = percent+"%";
}

/* إشعار */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* الصفحة */
function home(){
document.getElementById("content").innerHTML=`
<div class="card">
<h3>🎯 ابدأ التحدي</h3>
<button onclick="start()">ابدأ الآن</button>
</div>
`;
}

/* اختبار عشوائي */
let currentQ;

function start(){
newQuestion();
}

function newQuestion(){
let a=Math.floor(Math.random()*10)+1;
let b=Math.floor(Math.random()*10)+1;

currentQ={
q: a+" + "+b,
correct: a+b
};

let wrong=currentQ.correct+Math.floor(Math.random()*3)+1;

document.getElementById("content").innerHTML=`
<div class="card">
<p>كم ${currentQ.q} ؟</p>
<button onclick="answer(${currentQ.correct})">${currentQ.correct}</button>
<button onclick="answer(${wrong})">${wrong}</button>
</div>
`;
}

/* الإجابة */
function answer(val){

if(val==currentQ.correct){
xp+=10;
wins++;
playSound(true);
toast("✔ إجابة صحيحة +10 XP");
}else{
playSound(false);
toast("❌ خطأ");
}

levelUp();
save();
updateUI();

/* سؤال جديد */
setTimeout(newQuestion,800);
}

/* Level Up */
function levelUp(){
if(xp >= level*50){
level++;
toast("🔥 ارتقيت لمستوى "+level);
}
}

/* لعبة */
function game(){
document.getElementById("content").innerHTML=`
<div class="card">
<h3>🎮 اسحب الشكل</h3>

<div draggable="true" ondragstart="drag(event)" id="circle" class="circle"></div>
<div draggable="true" ondragstart="drag(event)" id="square" class="square"></div>

<br>

<p>ضع الدائرة 👇</p>
<div class="drop" data-type="circle" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<p>ضع المربع 👇</p>
<div class="drop" data-type="square" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

</div>
`;
}

function allowDrop(e){e.preventDefault()}
function drag(e){e.dataTransfer.setData("id",e.target.id)}

function drop(e){
e.preventDefault();
let id=e.dataTransfer.getData("id");

if(e.target.dataset.type==id){
e.target.appendChild(document.getElementById(id));
xp+=20;
toast("🎉 ممتاز +20 XP");
save();
updateUI();
}
}

/* إنجازات */
function achievements(){
document.getElementById("content").innerHTML=`
<div class="card">
<h3>🏆 إنجازاتك</h3>
<p>${wins>=5?"✔ حل 5 أسئلة": "❌ حل 5 أسئلة"}</p>
<p>${level>=3?"✔ وصل مستوى 3": "❌ مستوى 3"}</p>
<p>${xp>=100?"✔ جمع 100 XP": "❌ 100 XP"}</p>
</div>
`;
}

/* صوت */
function playSound(ok){
let audio = new Audio(ok?
"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg":
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

/* حفظ */
function save(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("wins",wins);
}

/* تشغيل */
home();

</script>

</body>
</html>
