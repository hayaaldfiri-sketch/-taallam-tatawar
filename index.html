<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعلم وتطور</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* هيدر */
.header {
  background: linear-gradient(to right, #7b2ff7, #f107a3);
  color: white;
  padding: 20px;
  text-align: center;
}

/* قائمة */
.menu {
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.menu button {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

/* محتوى */
.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* زر */
.btn {
  width: 100%;
  padding: 10px;
  background: #7b2ff7;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

/* اخفاء */
.hidden {
  display: none;
}

/* خيارات */
.option {
  background: #eee;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  cursor: pointer;
}

.correct { background: green; color: white; }
.wrong { background: red; color: white; }

/* اشكال */
.shape {
  font-size: 30px;
  margin: 10px;
  cursor: pointer;
}
</style>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* اختبار */
function checkAnswer(el, correct){
  if(correct){
    el.classList.add("correct");
    alert("✔ صح!");
  } else {
    el.classList.add("wrong");
    alert("❌ خطأ");
  }
}

/* نشاط */
function checkShape(type){
  if(type === "circle"){
    alert("✔ صح هذا دائرة");
  } else {
    alert("❌ هذا ليس دائرة");
  }
}
</script>

</head>

<body>

<div class="header">
  <h2>🎓 تعلم وتطور</h2>
</div>

<!-- القائمة -->
<div class="menu">
  <button onclick="showPage('home')">🏠 الرئيسية</button>
  <button onclick="showPage('lesson')">📚 درس</button>
  <button onclick="showPage('quiz')">🧠 اختبار</button>
  <button onclick="showPage('activity')">🎯 نشاط</button>
</div>

<!-- الرئيسية -->
<div id="home" class="page container">
  <div class="card">
    <h3>👋 مرحباً</h3>
    <p>ابدأ رحلتك التعليمية 🚀</p>
  </div>
</div>

<!-- الدرس -->
<div id="lesson" class="page container hidden">
  <div class="card">
    <h3>📘 التفكير الناقد</h3>
    <p>هو تحليل المعلومات قبل تصديقها.</p>
    <p>✔ اسأل: هل المصدر موثوق؟</p>
    <p>✔ هل يوجد دليل؟</p>
  </div>
</div>

<!-- اختبار رياضيات -->
<div id="quiz" class="page container hidden">
  <div class="card">
    <h3>🧠 اختبار رياضيات</h3>
    <p>كم ناتج 5 + 3 ؟</p>

    <div class="option" onclick="checkAnswer(this,false)">6</div>
    <div class="option" onclick="checkAnswer(this,true)">8</div>
    <div class="option" onclick="checkAnswer(this,false)">9</div>

    <p>كم ناتج 10 - 4 ؟</p>

    <div class="option" onclick="checkAnswer(this,false)">3</div>
    <div class="option" onclick="checkAnswer(this,true)">6</div>
    <div class="option" onclick="checkAnswer(this,false)">8</div>
  </div>
</div>

<!-- نشاط -->
<div id="activity" class="page container hidden">
  <div class="card">
    <h3>🎯 نشاط: اختر الدائرة</h3>

    <div class="shape" onclick="checkShape('square')">⬜</div>
    <div class="shape" onclick="checkShape('circle')">⚪</div>
    <div class="shape" onclick="checkShape('triangle')">🔺</div>

  </div>
</div>

</body>
</html>
